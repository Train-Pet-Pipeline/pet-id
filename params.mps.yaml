# pet-demo inference params — Apple Silicon (Metal Performance Shaders).
# Qwen2-VL uses float16 because MPS bfloat16 support is incomplete.
# Used by operators on macOS via: --params core/params.mps.yaml

version: "0.1.0"

detector:
  model_name: "yolov10n"
  weights_url: null
  # Lowered from 0.35 so partially-occluded real-footage cats (e.g. cat behind
  # chair legs) still get detected; imgsz raised from 640 to 960 so smaller /
  # further-away pets don't disappear below detection resolution.
  conf_threshold: 0.20
  iou_threshold: 0.5
  class_whitelist: [15, 16]
  device: "mps"
  imgsz: 960

tracker:
  # track_thresh lowered from 0.5 so partially-occluded / distant animals keep
  # their track instead of dropping to "coasting" every few frames (visual
  # flicker). Keeps BYTETrack's two-pass association intact — just broadens
  # what counts as a high-confidence association target.
  track_thresh: 0.3
  high_thresh: 0.6
  match_thresh: 0.8
  track_buffer: 30
  frame_rate: 30

reid:
  model_name: "osnet_x0_25"
  embedding_dim: 512
  similarity_threshold: 0.65
  device: "mps"

pose:
  config: "configs/animal_2d_keypoint/topdown_heatmap/ap10k/td-hm_hrnet-w32_8xb64-210e_ap10k-256x256.py"
  checkpoint_url: "https://download.openmmlab.com/mmpose/animal/hrnet/hrnet_w32_ap10k_256x256-18aac840_20211029.pth"
  keypoint_threshold: 0.3
  device: "mps"

narrative:
  model_id: "Qwen/Qwen2-VL-2B-Instruct"
  device: "mps"
  dtype: "float16"
  max_new_tokens: 128
  temperature: 0.7
  # Cap per-image pixel budget so multi-frame prompts fit inside MPS unified-memory.
  # 256 * 28 * 28 ≈ 200k pixels per image (~448x448-equivalent).
  min_pixels: 50176    # 8 * 28 * 28
  max_pixels: 200704   # 256 * 28 * 28
  system_prompt: |
    你是一个懂宠物行为的观察者。看图后用中文一句话描述宠物当下状态，不超过 30 字。

pipeline:
  # Offline bake uses chapter-based VLM (offline_bake.bake_m4._build_real_vlm_call);
  # disable the live-streaming in-pipeline trigger so we do not pay 60-frame
  # Qwen2-VL passes that blow up MPS unified memory.
  vlm_trigger_interval_frames: 100000
  vlm_trigger_on_detection_change: false
  parallel_reid_pose: true

logging:
  level: "INFO"
  format: "json"

retry:
  max_attempts: 3
  wait_seconds: 1.5
