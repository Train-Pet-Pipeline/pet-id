name: no-wandb-residue

# Positive-list CI guard: scans only the live runtime surface for W&B residue.
#
# Why positive-list instead of exclusion-list:
#   Historical docs may still mention "wandb" in legitimate context.
#   Maintaining an exclusion list is fragile — positive-list only what
#   SHOULD be clean. Forward-looking guard for pet-id: the repo has never
#   carried W&B code, but this prevents an accidental import from a
#   future bootstrap from pet-train or similar.

on:
  push:
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for wandb references in live first-party code
        run: |
          set -e

          # Positive-list scan: only first-party code / config.
          # Exclude this guard workflow itself (it necessarily names the token).
          MATCHES=$(grep -rEn '\bwandb\b' \
            --include='*.py' --include='*.yaml' --include='*.yml' \
            --include='*.toml' --include='*.sh' \
            --exclude='no-wandb-residue.yml' \
            src/ tests/ .github/ params.yaml params.cpu.yaml params.mps.yaml 2>/dev/null || true)

          if [ -n "$MATCHES" ]; then
            echo "::error::W&B residue found in live first-party code. Remove it and use an alternate tracker instead."
            echo "$MATCHES"
            exit 1
          fi

          echo "Clean — no W&B residue detected in live first-party surface."
